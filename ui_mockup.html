<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32-P4 Edge Classifier UI Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  .device {
    width: 1024px;
    height: 600px;
    background: #0d0d1a;
    border-radius: 32px;
    border: 2px solid #2a2a4a;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 0 80px rgba(80,60,255,0.05);
  }

  /* ===== Status Bar ===== */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px;
    background: linear-gradient(180deg, #12122a 0%, #0d0d1a 100%);
    border-bottom: 1px solid #1e1e3a;
  }
  .status-left { display: flex; align-items: center; gap: 10px; }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 12px #00ff8844;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { color: #00ff88; font-size: 14px; letter-spacing: 0.5px; }
  .status-time { color: #6666aa; font-size: 14px; }
  .status-right { display: flex; gap: 18px; }
  .status-icon { color: #5555aa; font-size: 18px; cursor: pointer; transition: 0.2s; }
  .status-icon:hover { color: #8888dd; }

  /* ===== Main Content ===== */
  .main-content {
    display: flex;
    height: calc(600px - 52px);
  }

  /* ===== Center Area ===== */
  .center-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 40px;
    position: relative;
  }

  .face {
    font-size: 120px;
    line-height: 1;
    transition: all 0.4s ease;
    cursor: pointer;
    user-select: none;
    text-shadow: 0 0 60px rgba(138, 43, 226, 0.3);
  }
  .face:hover { transform: scale(1.05); }
  .face-label {
    color: #ccccee;
    font-size: 28px;
    margin-top: 12px;
    font-weight: 600;
    letter-spacing: 2px;
  }
  .face-icon {
    font-size: 36px;
    margin-top: 4px;
  }

  /* ===== Confidence Ring ===== */
  .confidence-ring {
    position: relative;
    margin-top: 16px;
    width: 80px; height: 80px;
  }
  .confidence-ring svg { transform: rotate(-90deg); }
  .confidence-ring .bg { fill: none; stroke: #1e1e3a; stroke-width: 6; }
  .confidence-ring .fg {
    fill: none; stroke: #8855ff; stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
  }
  .confidence-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #aaaadd;
    font-size: 16px;
    font-weight: 700;
  }

  /* ===== Audio Wave ===== */
  .wave-container {
    width: 100%;
    height: 50px;
    margin-top: 20px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
  }
  .wave-bar {
    width: 6px;
    background: linear-gradient(to top, #6633cc, #8855ff);
    border-radius: 3px 3px 0 0;
    transition: height 0.15s ease;
    min-height: 4px;
    opacity: 0.6;
  }
  .wave-bar.active { opacity: 1; }

  /* ===== Right Panel ===== */
  .right-panel {
    width: 280px;
    padding: 16px 20px;
    border-left: 1px solid #1e1e3a;
    display: flex;
    flex-direction: column;
  }
  .panel-title {
    color: #6666aa;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .history-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .history-list::-webkit-scrollbar { width: 3px; }
  .history-list::-webkit-scrollbar-thumb { background: #333366; border-radius: 2px; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px;
    background: #14142a;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: 0.2s;
    cursor: pointer;
  }
  .history-item:hover { border-color: #3a3a6a; background: #1a1a35; }
  .history-item.latest {
    border-color: #8855ff44;
    background: linear-gradient(135deg, #1a1040, #14142a);
  }
  .h-icon { font-size: 20px; width: 28px; text-align: center; }
  .h-info { flex: 1; }
  .h-class { color: #ddddff; font-size: 14px; font-weight: 600; }
  .h-detail { display: flex; gap: 8px; color: #555588; font-size: 11px; }
  .h-conf { color: #88aaff; }
  .h-time { color: #444477; }

  /* ===== Bottom Cards ===== */
  .bottom-cards {
    display: flex;
    gap: 8px;
    padding: 8px 0;
  }
  .mini-card {
    flex: 1;
    background: #14142a;
    border-radius: 8px;
    padding: 8px;
    text-align: center;
    border: 1px solid #1e1e3a;
    cursor: pointer;
    transition: 0.2s;
  }
  .mini-card:hover { border-color: #3a3a6a; background: #1a1a35; }
  .mini-card .icon { font-size: 18px; }
  .mini-card .label { color: #8888bb; font-size: 10px; margin-top: 2px; }
  .mini-card .conf { color: #88aaff; font-size: 11px; font-weight: 600; }

  /* ===== Page tabs ===== */
  .page-tabs {
    display: flex;
    gap: 4px;
    padding: 4px 0 2px;
    border-top: 1px solid #1e1e3a;
    padding-top: 10px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 6px;
    border-radius: 6px;
    font-size: 11px;
    color: #555588;
    cursor: pointer;
    transition: 0.2s;
  }
  .tab:hover { color: #9999dd; background: #16162e; }
  .tab.active { color: #aaaadd; background: #1a1a35; }

  /* ===== Page 2: History ===== */
  .page-history {
    display: none;
    flex-direction: column;
    padding: 16px 24px;
    overflow-y: auto;
  }
  .page-history .ph-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 12px;
    border-bottom: 1px solid #1a1a30;
  }
  .ph-item .icon { font-size: 22px; width: 32px; }
  .ph-item .info { flex: 1; }
  .ph-item .cls { color: #ccccee; font-size: 15px; }
  .ph-item .detail { color: #555588; font-size: 11px; }
  .ph-item .bar {
    width: 80px; height: 6px;
    background: #1e1e3a;
    border-radius: 3px;
    overflow: hidden;
    margin-left: auto;
  }
  .ph-item .bar .fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  .empty-state {
    color: #444477;
    text-align: center;
    padding: 40px;
    font-size: 14px;
  }

  /* ===== Page 3: Settings ===== */
  .page-settings {
    display: none;
    padding: 20px 28px;
  }
  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid #1a1a30;
  }
  .setting-row .label { color: #ccccee; font-size: 15px; }
  .setting-row .value { color: #8888dd; font-size: 14px; min-width: 40px; text-align: right; }
  .setting-row input[type="range"] {
    width: 200px;
    -webkit-appearance: none;
    background: #1e1e3a;
    height: 4px;
    border-radius: 2px;
    outline: none;
  }
  .setting-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    background: #8855ff;
    border-radius: 50%;
    cursor: pointer;
  }

  /* Nav button */
  .nav-btn {
    background: none;
    border: 1px solid #2a2a5a;
    color: #7777bb;
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
  }
  .nav-btn:hover { border-color: #8855ff; color: #aaaadd; }
  .nav-btn.active { border-color: #8855ff; color: #ccccee; }
</style>
</head>
<body>

<div class="device" id="app">
  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-left">
      <div class="status-dot"></div>
      <span class="status-text">正在聆听</span>
    </div>
    <span class="status-time">12:30:15</span>
    <div class="status-right">
      <span class="status-icon" onclick="switchPage('page1')" title="主页">🏠</span>
      <span class="status-icon" onclick="switchPage('page2')" title="日志">📋</span>
      <span class="status-icon" onclick="switchPage('page3')" title="设置">⚙️</span>
    </div>
  </div>

  <!-- Page 1: Main -->
  <div id="page1" class="main-content" style="display:flex">
    <!-- Center -->
    <div class="center-area">
      <div class="face" id="mainFace" onclick="nextFace()">(ᵔ◡ᵔ)</div>
      <div class="face-label" id="mainLabel">环境安静</div>
      <div class="face-icon" id="mainIcon">🎵</div>
      <div class="confidence-ring">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="bg" cx="40" cy="40" r="32"/>
          <circle class="fg" id="confRing" cx="40" cy="40" r="32"
                  stroke-dasharray="201" stroke-dashoffset="100"/>
        </svg>
        <div class="confidence-text" id="confText">50%</div>
      </div>

      <!-- Waveform -->
      <div class="wave-container" id="waveBox"></div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="panel-title">📊 实时识别</div>
      <div class="history-list" id="historyList">
        <div class="empty-state">等待声音触发…</div>
      </div>
      <div class="bottom-cards">
        <div class="mini-card"><div class="icon">🚗</div><div class="label">喇叭</div><div class="conf">-</div></div>
        <div class="mini-card"><div class="icon">🐕</div><div class="label">狗叫</div><div class="conf">-</div></div>
        <div class="mini-card"><div class="icon">🔔</div><div class="label">门铃</div><div class="conf">-</div></div>
        <div class="mini-card"><div class="icon">🛎️</div><div class="label">敲门</div><div class="conf">-</div></div>
      </div>
      <div class="page-tabs">
        <div class="tab active">实时</div>
        <div class="tab" onclick="switchPage('page2')">历史</div>
        <div class="tab" onclick="switchPage('page3')">设置</div>
      </div>
    </div>
  </div>

  <!-- Page 2: History -->
  <div id="page2" class="page-history" style="display:none; height:548px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px;">
      <span class="panel-title" style="margin:0">📋 历史记录</span>
      <button class="nav-btn" onclick="addHistory('模拟触发了...')">+ 添加模拟</button>
    </div>
    <div style="flex:1;overflow-y:auto" id="fullHistory">
      <div class="empty-state" style="padding:30px">暂无记录</div>
    </div>
  </div>

  <!-- Page 3: Settings -->
  <div id="page3" class="page-settings" style="display:none; height:548px">
    <div class="panel-title" style="margin:0 0 12px">⚙️ 设置</div>
    <div class="setting-row">
      <span class="label">置信度阈值</span>
      <div style="display:flex;align-items:center;gap:12px">
        <input type="range" min="50" max="99" value="70" oninput="this.nextElementSibling.textContent=this.value+'%'">
        <span class="value">70%</span>
      </div>
    </div>
    <div class="setting-row">
      <span class="label">去抖帧数</span>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="nav-btn" onclick="debounceCount=Math.max(1,debounceCount-1);this.parentNode.querySelector('.value').textContent=debounceCount">−</button>
        <span class="value" id="debounceVal">2</span>
        <button class="nav-btn" onclick="debounceCount=Math.min(10,debounceCount+1);this.parentNode.querySelector('.value').textContent=debounceCount">+</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="label">音量阈值</span>
      <div style="display:flex;align-items:center;gap:12px">
        <input type="range" min="10" max="100" value="30" oninput="this.nextElementSibling.textContent=this.value">
        <span class="value">30</span>
      </div>
    </div>
    <div class="setting-row" style="border:none">
      <span class="label">模型版本</span>
      <span class="value" style="color:#666">v1.3 — 12 类 (90.5%)</span>
    </div>
    <div class="setting-row" style="border:none">
      <span class="label">总识别次数</span>
      <span class="value" style="color:#666">0 次</span>
    </div>
  </div>
</div>

<script>
// ===== Classes data =====
const CLASSES = [
  { id: 0, name: '警报', icon: '🚨', emoji: '>_<', color: '#ff4444' },
  { id: 1, name: '汽车喇叭', icon: '📯', emoji: 'O_O', color: '#ff8844' },
  { id: 2, name: '敲门', icon: '🚪', emoji: '^_^', color: '#44dd88' },
  { id: 3, name: '拍手', icon: '👏', emoji: ':D', color: '#ffdd44' },
  { id: 4, name: '狗叫', icon: '🐕', emoji: ':P', color: '#88bbff' },
  { id: 5, name: '脚步声', icon: '👣', emoji: '..', color: '#aaaacc' },
  { id: 6, name: '玻璃破碎', icon: '💔', emoji: '!!', color: '#ff66aa' },
  { id: 7, name: '门铃', icon: '🔔', emoji: ':>', color: '#66ddff' },
  { id: 8, name: '婴儿哭', icon: '👶', emoji: ":'(", color: '#ff6699' },
  { id: 9, name: '引擎', icon: '🔧', emoji: '-_-', color: '#bb8844' },
  { id: 10, name: '交通', icon: '🚗', emoji: ':|', color: '#9999bb' },
  { id: 11, name: '安静', icon: '🎵', emoji: '(ᵔ◡ᵔ)', color: '#66ff88' },
];

let currentClass = 11;
let debounceCount = 2;
let simTimeout = null;

// ===== Waveform =====
(function initWave() {
  const box = document.getElementById('waveBox');
  for (let i = 0; i < 48; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.height = (4 + Math.random() * 20) + 'px';
    box.appendChild(bar);
  }
  setInterval(() => {
    document.querySelectorAll('.wave-bar').forEach(b => {
      b.style.height = (4 + Math.random() * 46) + 'px';
      b.classList.toggle('active', Math.random() > 0.6);
    });
  }, 200);
})();

// ===== Update face =====
function updateDisplay(cls) {
  const c = CLASSES[cls] || CLASSES[11];
  currentClass = cls;
  document.getElementById('mainFace').textContent = c.emoji;
  document.getElementById('mainLabel').textContent = c.name;
  document.getElementById('mainIcon').textContent = c.icon;

  const conf = 50 + Math.floor(Math.random() * 45);
  document.getElementById('confText').textContent = conf + '%';
  const circumference = 201;
  const offset = circumference - (conf / 100) * circumference;
  document.getElementById('confRing').setAttribute('stroke-dashoffset', offset);
  document.getElementById('confRing').setAttribute('stroke', c.color);

  // Update history box
  addHistory(cls, conf);
}

// ===== History (right panel) =====
function addHistory(cls, conf) {
  const c = CLASSES[cls !== undefined ? cls : 11] || CLASSES[11];
  const time = new Date().toLocaleTimeString();
  const list = document.getElementById('historyList');
  const item = document.createElement('div');
  item.className = 'history-item latest';
  item.innerHTML = `
    <div class="h-icon">${c.icon}</div>
    <div class="h-info">
      <div class="h-class">${c.name}</div>
      <div class="h-detail">
        <span class="h-conf">${conf || '??'}%</span>
        <span class="h-time">${time}</span>
      </div>
    </div>
  `;
  list.insertBefore(item, list.firstChild);
  while (list.children.length > 15) list.removeChild(list.lastChild);
  document.querySelector('.empty-state')?.remove();

  // Add to full history
  const fh = document.getElementById('fullHistory');
  if (fh) {
    const fi = document.createElement('div');
    fi.className = 'ph-item';
    const fillWidth = conf || 50;
    fi.innerHTML = `
      <div class="icon">${c.icon}</div>
      <div class="info">
        <div class="cls">${c.name}</div>
        <div class="detail">${time} · 阈值 ${debounceCount}帧</div>
      </div>
      <div class="bar"><div class="fill" style="width:${fillWidth}%;background:${c.color}"></div></div>
    `;
    fh.insertBefore(fi, fh.firstChild);
    while (fh.children.length > 50) fh.removeChild(fh.lastChild);
    document.querySelector('#fullHistory .empty-state')?.remove();
  }

  // Update mini cards
  const cards = document.querySelectorAll('.mini-card .conf');
  const recent = getRecentClasses();
  cards.forEach((el, i) => {
    el.textContent = recent[i] ? recent[i].conf + '%' : '-';
    el.parentElement.querySelector('.icon').textContent = recent[i] ? CLASSES[recent[i].cls].icon : '';
  });
}

function getRecentClasses() {
  const items = document.querySelectorAll('#historyList .history-item');
  const result = [];
  items.forEach(item => {
    const name = item.querySelector('.h-class').textContent;
    const confText = item.querySelector('.h-conf').textContent;
    const cls = CLASSES.find(c => c.name === name);
    if (cls) result.push({ cls: cls.id, conf: parseInt(confText) });
  });
  return result.slice(0, 4);
}

// ===== Pages =====
function switchPage(page) {
  document.querySelectorAll('[id^=page]').forEach(p => p.style.display = 'none');
  const target = document.getElementById(page);
  if (target) target.style.display = page === 'page1' ? 'flex' : 'block';
}

// ===== Sim trigger =====
function triggerSound() {
  const cls = Math.floor(Math.random() * 12);
  const conf = 65 + Math.floor(Math.random() * 30);
  updateDisplay(cls, conf);
}

function nextFace() {
  triggerSound();
}

setInterval(() => {
  if (Math.random() > 0.85) {
    const cls = Math.floor(Math.random() * 12);
    const conf = 65 + Math.floor(Math.random() * 30);
    updateDisplay(cls, conf);
  }
}, 3000);

// Init
updateDisplay(11);
</script>
</body>
</html>
